<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多益 700 分</title>
<style>
:root { 
    --primary: #2563eb; 
    --star: #f1c40f; 
    --bg: #f1f5f9; 
    --text: #1e293b; 
    --mask-bg: #cbd5e1; 
}
body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
.container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

/* 頂部控制區 */
.header { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; margin-top: 15px; justify-content: center; }
input#searchInput { flex-grow: 1; min-width: 200px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s; }
input#searchInput:focus { border-color: var(--primary); }

.filter-select { padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; background: white; color: #475569; font-weight: bold; cursor: pointer; }

.btn { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
.btn-filter { background-color: white; border: 2px solid #e2e8f0; color: #64748b; }
.btn-filter.active { background-color: var(--star); color: #856404; border-color: #f1c40f; }

/* 遮蔽控制按鈕樣式 */
.btn-mask-ctrl { background-color: #6366f1; color: white; }
.btn-mask-ctrl.active { background-color: #4338ca; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }

/* 表格樣式 */
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th { background-color: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; }
td { padding: 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tr:hover { background-color: #fdfdfd; }

/* 單字與收藏 */
.word-box { display: flex; align-items: center; gap: 10px; }
.star-icon { cursor: pointer; font-size: 1.4rem; color: #cbd5e1; transition: 0.2s; user-select: none; }
.star-icon.active { color: var(--star); }
.word-text { font-weight: 800; color: var(--primary); font-size: 1.2rem; cursor: pointer; }

/* 遮蔽效果 */
.mask-text {
    position: relative;
    display: inline-block;
    cursor: pointer;
    background-color: var(--mask-bg); 
    color: transparent; 
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 40px;
    transition: all 0.2s ease;
    user-select: none;
}
.mask-text.show {
    background-color: transparent;
    color: inherit;
    user-select: auto;
}

/* 針對單字的特殊遮蔽顏色 */
.mask-word { background-color: #94a3b8; }

.pos-tag { padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: white; background: #94a3b8; font-weight: bold; margin-right: 4px; display: inline-block;}
.pos-n { background: #f59e0b; }
.pos-v { background: #3b82f6; }
.pos-adj { background: #10b981; }
.pos-adv { background: #8b5cf6; }

.audio-btn { background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; color: var(--primary); transition: 0.2s; }
.audio-btn:hover { background: var(--primary); color: white; }

/* 例句排版 */
.sentence-block { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #e2e8f0; }
.sentence-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.example-en { font-style: italic; color: #475569; margin-bottom: 4px; display: block; font-weight: 500; cursor: pointer; }
.example-ch { font-size: 0.9rem; }

@media (max-width: 900px) {
    th:nth-child(2), th:nth-child(3) { display: none; }
    td { display: block; border: none; padding: 10px; }
    tr { display: block; border-bottom: 4px solid #f1f5f9; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚀 多益 700 分</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜尋單字、中文..." onkeyup="render()">
            
            <select id="vocFilter" class="filter-select" onchange="render()">
                <option value="all">所有分類 (Voc)</option>
                <option value="voc.1">Voc. 1</option>
                <option value="voc.2">Voc. 2</option>
				<option value="voc.3">Voc. 3</option>
            </select>

            <select id="unitFilter" class="filter-select" onchange="render()">
                <option value="all">所有單元 (Unit)</option>
                <option value="unit1">Unit 1</option>
                <option value="unit2">Unit 2</option>
                <option value="unit3">Unit 3</option>
            </select>

            <button id="filterBtn" class="btn btn-filter" onclick="toggleFilter()">⭐ 只看收藏</button>
        </div>

        <div class="controls">
            <button id="btnMaskWord" class="btn btn-mask-ctrl" onclick="toggleMaskType('mask-word', this)">👁️ 隱藏單字</button>
            <button id="btnMaskDef" class="btn btn-mask-ctrl" onclick="toggleMaskType('mask-def', this)">📖 隱藏定義</button>
            <button id="btnMaskSent" class="btn btn-mask-ctrl" onclick="toggleMaskType('mask-sent', this)">📝 隱藏例句</button>
            <button class="btn" style="background:#475569; color:white;" onclick="maskAll(false)">🔓 全部解除</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="20%">單字</th>
                <th width="10%">詞性</th>
                <th width="20%">中文定義</th>
                <th width="45%">例句</th>
            </tr>
        </thead>
        <tbody id="vocabBody"></tbody>
    </table>
</div>

const normalizedData = rawDataList.map(item => ({
    ...item,
    favorite: false,
    sentences: item.sentences || [{ en: item.exampleEn, ch: item.exampleCh }]
}));

let vocabs = JSON.parse(localStorage.getItem('myVocabDB_v9')) || normalizedData;
let onlyShowFavorites = false;
let maskStates = { 'mask-word': false, 'mask-def': false, 'mask-sent': false };

// 語音引擎優化
let synth = window.speechSynthesis;
let preferredVoice = null;

// 取得高品質語音包
function loadVoices() {
    let voices = synth.getVoices();
    // 優先順序：Edge/Google 的 Neural 語音 > 一般 Google 語音 > 英文預設語音
    preferredVoice = voices.find(v => v.name.includes("Microsoft Online") && v.lang.startsWith("en")) ||
                     voices.find(v => v.name.includes("Google") && v.lang.startsWith("en")) ||
                     voices.find(v => v.lang.startsWith("en"));
}

// 監聽語音包載入（部分瀏覽器非同步載入）
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
}
loadVoices();

function speak(text, rate = 0.9) {
    synth.cancel(); // 先停止之前的發音
    const msg = new SpeechSynthesisUtterance(text);
    
    if (preferredVoice) {
        msg.voice = preferredVoice;
    }
    
    msg.lang = 'en-US';
    msg.rate = rate; // 稍微放慢一點更像自然說話
    msg.pitch = 1.0;
    msg.volume = 1.0;
    
    synth.speak(msg);
}

function save() {
    localStorage.setItem('myVocabDB_v9', JSON.stringify(vocabs));
    render();
}

function render() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const selVoc = document.getElementById('vocFilter').value;
    const selUnit = document.getElementById('unitFilter').value;
    const body = document.getElementById('vocabBody');

    const filtered = vocabs.filter((v) => {
        const matchesSearch = v.word.toLowerCase().includes(query) || v.chinese.includes(query);
        const matchesFav = onlyShowFavorites ? v.favorite : true;
        const matchesVoc = (selVoc === 'all') ? true : (v.voc === selVoc);
        const matchesUnit = (selUnit === 'all') ? true : (v.unit === selUnit);
        return matchesSearch && matchesFav && matchesVoc && matchesUnit;
    });

    body.innerHTML = filtered.map((item) => {
        const realIndex = vocabs.findIndex(v => v.word === item.word);
        
        const posTags = item.pos.split('/').map(p => {
            const cleanPos = p.replace('.', '').trim();
            return `<span class="pos-tag pos-${cleanPos}">${p}</span>`;
        }).join('');

        const sentencesHtml = item.sentences.map((sent) => `
            <div class="sentence-block">
                <button class="audio-btn" style="width:26px; height:26px; font-size:0.7rem;" onclick="speak('${sent.en.replace(/'/g, "\\'")}', 0.85)">🔊</button>
                <div>
                    <span class="example-en" onclick="speak('${sent.en.replace(/'/g, "\\'")}', 0.85)">${sent.en}</span>
                    <span class="example-ch mask-text mask-sent ${maskStates['mask-sent'] ? '' : 'show'}" onclick="this.classList.toggle('show')">${sent.ch}</span>
                </div>
            </div>
        `).join('');

        return `
        <tr>
            <td>
                <div class="word-box">
                    <span class="star-icon ${item.favorite ? 'active' : ''}" onclick="toggleStar(event, ${realIndex})">★</span>
                    <button class="audio-btn" onclick="speak('${item.word.replace(/'/g, "\\'")}', 0.8)">🔊</button>
                    <span class="word-text mask-text mask-word ${maskStates['mask-word'] ? '' : 'show'}" onclick="this.classList.toggle('show')">${item.word}</span>
                </div>
            </td>
            <td>${posTags}</td>
            <td>
                <span class="mask-text mask-def ${maskStates['mask-def'] ? '' : 'show'}" onclick="this.classList.toggle('show')">${item.chinese}</span>
            </td>
            <td>${sentencesHtml}</td>
        </tr>
        `;
    }).join('');
}

function toggleMaskType(type, btn) {
    maskStates[type] = !maskStates[type];
    btn.classList.toggle('active', maskStates[type]);
    render();
}

function maskAll(shouldMask) {
    maskStates = { 'mask-word': shouldMask, 'mask-def': shouldMask, 'mask-sent': shouldMask };
    document.querySelectorAll('.btn-mask-ctrl').forEach(b => b.classList.toggle('active', shouldMask));
    render();
}

function toggleStar(e, index) {
    e.stopPropagation();
    vocabs[index].favorite = !vocabs[index].favorite;
    save();
}

function toggleFilter() {
    onlyShowFavorites = !onlyShowFavorites;
    const btn = document.getElementById('filterBtn');
    btn.classList.toggle('active', onlyShowFavorites);
    render();
}

render();
</script>
</body>
</html>
