<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多益700分</title>
<style>
:root { --primary: #2563eb; --star: #f1c40f; --bg: #f1f5f9; --text: #1e293b; }
body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
.container { max-width: 1250px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.header { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
.controls { display: flex; gap: 10px; width: 100%; margin-top: 15px; }
input#searchInput { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; }
.btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
.btn-filter.active { background-color: var(--star); color: #856404; }
.btn-add { background-color: #10b981; color: white; }
table { width: 100%; border-collapse: collapse; }
th { background-color: #f8fafc; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; }
td { padding: 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
.word-text { font-weight: 800; color: var(--primary); font-size: 1.2rem; }
.star-icon { cursor: pointer; font-size: 1.4rem; color: #cbd5e1; }
.star-icon.active { color: var(--star); }
.pos-tag { padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: white; background: #94a3b8; }
.audio-btn { background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; color: var(--primary); }
.audio-btn:hover { background: var(--primary); color: white; }
.example-en { font-style: italic; color: #475569; margin-bottom: 4px; display: block; }
.example-ch { color: #94a3b8; font-size: 0.9rem; display: block; }
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>多益700分</h1>
<div class="controls">
<input type="text" id="searchInput" placeholder="搜尋單字、中文..." onkeyup="render()">
<button id="filterBtn" class="btn" style="background:white; border:2px solid #eee;" onclick="toggleFilter()">⭐ 只看收藏</button>
<button class="btn btn-add" onclick="manualAdd()">＋ 新增單字</button>
</div>
</div>

<table>
<thead>
<tr>
<th width="20%">單字 (優先選用真人音)</th>
<th width="10%">詞性</th>
<th width="20%">中文定義</th>
<th width="50%">例句 (中英對照)</th>
</tr>
</thead>
<tbody id="vocabBody"></tbody>
</table>
</div>

<script>
// 這裡放入你之前的 1-50 單字數據 (為節省長度，此處僅放範例，請自行貼回 v4 的完整 defaultData 清單)
const defaultData = [
{ word: "ability", pos: "n.", chinese: "能力；才能", exampleEn: "She's a woman of considerable abilities.", exampleCh: "她是個才華橫溢的女性。", favorite: false },
{ word: "acquisition", pos: "n.", chinese: "收購；獲得", exampleEn: "The acquisition of a small publishing firm.", exampleCh: "收購了一家小型出版商。", favorite: false },
{ word: "affiliated", pos: "adj.", chinese: "附屬的；隸屬的", exampleEn: "The school is affiliated with a national association.", exampleCh: "該校隸屬於一個全國協會。", favorite: false }
// ... 請在此處補回 4-50 號單字 ...
];

let vocabs = JSON.parse(localStorage.getItem('myVocabDB_v5')) || defaultData;
let onlyShowFavorites = false;
let preferredVoice = null;

// --- 關鍵語音設定 ---
function loadVoices() {
const voices = window.speechSynthesis.getVoices();
// 優先順序：Edge Natural > Google US English > 任何含有 Microsoft 的英文聲音
preferredVoice = voices.find(v => v.name.includes("Natural") && v.lang.includes("en-US")) ||
voices.find(v => v.name.includes("Google") && v.lang.includes("en-US")) ||
voices.find(v => v.name.includes("Microsoft") && v.lang.includes("en-US")) ||
voices.find(v => v.lang.includes("en-US"));
}

// 某些瀏覽器需要監聽 voiceschanged 事件
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, rate) {
window.speechSynthesis.cancel();
const msg = new SpeechSynthesisUtterance(text);

if (preferredVoice) {
msg.voice = preferredVoice;
}
msg.lang = 'en-US';
msg.rate = rate;
window.speechSynthesis.speak(msg);
}
// ------------------

function save() {
localStorage.setItem('myVocabDB_v5', JSON.stringify(vocabs));
render();
}

function toggleStar(index) {
vocabs[index].favorite = !vocabs[index].favorite;
save();
}

function toggleFilter() {
onlyShowFavorites = !onlyShowFavorites;
const btn = document.getElementById('filterBtn');
btn.classList.toggle('active', onlyShowFavorites);
btn.innerHTML = onlyShowFavorites ? "★ 收藏模式" : "⭐ 只看收藏";
render();
}

function render() {
const query = document.getElementById('searchInput').value.toLowerCase();
const body = document.getElementById('vocabBody');

const filtered = vocabs.filter((v) => {
const matchesSearch = v.word.toLowerCase().includes(query) || v.chinese.includes(query);
const matchesFilter = onlyShowFavorites ? v.favorite : true;
return matchesSearch && matchesFilter;
});

body.innerHTML = filtered.map((item) => {
const realIndex = vocabs.findIndex(v => v.word === item.word);
return `
<tr>
<td>
<div style="display:flex; align-items:center; gap:10px;">
<span class="star-icon ${item.favorite ? 'active' : ''}" onclick="toggleStar(${realIndex})">★</span>
<button class="audio-btn" onclick="speak('${item.word}', 0.8)">🔊</button>
<span class="word-text">${item.word}</span>
</div>
</td>
<td><span class="pos-tag">${item.pos}</span></td>
<td>${item.chinese}</td>
<td>
<div style="display:flex; gap:10px; align-items:flex-start;">
<button class="audio-btn" style="width:26px; height:26px; font-size:0.7rem;" onclick="speak('${item.exampleEn.replace(/'/g, "\\'")}', 0.9)">🔊</button>
<div>
<span class="example-en">${item.exampleEn}</span>
<span class="example-ch">${item.exampleCh}</span>
</div>
</div>
</td>
</tr>
`;
}).join('');
}

function manualAdd() {
const word = prompt("單字:"); if (!word) return;
const pos = prompt("詞性:");
const chinese = prompt("中文:");
const en = prompt("英文例句:");
const ch = prompt("中文翻譯:");
vocabs.unshift({ word, pos, chinese, exampleEn: en, exampleCh: ch, favorite: false });
save();
}

render();
</script>

</body>
</html>
